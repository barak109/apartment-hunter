<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏠 מצאן דירות</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #17171f;
    --surface2: #1e1e2a;
    --border: #2a2a38;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --yes: #22c55e;
    --no: #ef4444;
    --maybe: #f59e0b;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --card-radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .last-updated { font-size: 12px; color: var(--muted); }
  .refresh-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .refresh-btn:hover { opacity: 0.85; }

  /* ── Tabs ── */
  .tabs-bar {
    display: flex;
    gap: 4px;
    padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab {
    padding: 10px 20px;
    border-radius: 10px 10px 0 0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    border: 1px solid transparent;
    border-bottom: none;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab.active {
    background: var(--bg);
    color: var(--text);
    border-color: var(--border);
  }
  .tab-count {
    background: var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 700;
  }
  .tab.active .tab-count { background: var(--accent); color: #fff; }

  /* ── Main ── */
  main {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar input, .filter-bar select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    outline: none;
  }
  .filter-bar input:focus, .filter-bar select:focus { border-color: var(--accent); }
  .results-count { color: var(--muted); font-size: 13px; margin-right: auto; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.3s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    background: var(--surface2);
    display: block;
    position: relative;
  }
  .card-img-placeholder {
    width: 100%;
    height: 180px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .card-img-wrap { position: relative; }
  .source-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
    backdrop-filter: blur(4px);
  }
  .new-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .card-body { padding: 14px 16px; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-address { font-size: 12px; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 4px; }

  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tag.price { background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.3); color: #a78bfa; }
  .tag.ok { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.2); color: #4ade80; }
  .tag.warn { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); color: #fcd34d; }
  .tag.bad { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); color: #f87171; }

  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    max-height: 48px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .card-actions { display: flex; gap: 8px; }
  .btn-yes, .btn-no, .btn-link {
    flex: 1;
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-yes { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .btn-yes:hover { background: rgba(34,197,94,0.3); }
  .btn-no { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
  .btn-no:hover { background: rgba(239,68,68,0.25); }
  .btn-link { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); flex: 0; padding: 10px 14px; }
  .btn-link:hover { color: var(--text); }

  /* ── Liked tab sub-tabs ── */
  .sub-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .sub-tab {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.2s;
  }
  .sub-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* category buttons on liked cards */
  .cat-btns { display: flex; gap: 6px; margin-top: 8px; }
  .cat-btn {
    flex: 1;
    border-radius: 8px;
    padding: 7px;
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
  }
  .cat-btn.talk { background: rgba(34,197,94,0.1); color: #4ade80; border-color: rgba(34,197,94,0.3); }
  .cat-btn.talk.active { background: rgba(34,197,94,0.3); }
  .cat-btn.maybe { background: rgba(245,158,11,0.1); color: #fcd34d; border-color: rgba(245,158,11,0.3); }
  .cat-btn.maybe.active { background: rgba(245,158,11,0.3); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.15s;
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: 90%;
    max-width: 420px;
    direction: rtl;
  }
  .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .modal textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    margin-bottom: 16px;
  }
  .modal textarea:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-skip { background: none; border: 1px solid var(--border); color: var(--muted); }
  .modal-submit { background: var(--accent); color: #fff; border: none; }
  .modal-skip, .modal-submit {
    border-radius: 10px;
    padding: 10px 20px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 56px; margin-bottom: 16px; }
  .empty h3 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">מצאן <span>דירות</span> 🏠</div>
  <div class="last-updated" id="last-updated">טוען...</div>
  <button class="refresh-btn" onclick="loadData()">🔄 רענן</button>
</header>

<div class="tabs-bar">
  <div class="tab active" onclick="switchTab('new')" id="tab-new">
    🆕 דירות חדשות <span class="tab-count" id="count-new">0</span>
  </div>
  <div class="tab" onclick="switchTab('liked')" id="tab-liked">
    ❤️ אהבתי <span class="tab-count" id="count-liked">0</span>
  </div>
</div>

<main>
  <!-- New tab -->
  <div id="panel-new">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="🔍 חיפוש חופשי..." oninput="renderNew()" style="min-width:200px">
      <select id="source-filter" onchange="renderNew()">
        <option value="">כל המקורות</option>
        <option value="yad2">יד2</option>
        <option value="facebook_marketplace">מרקטפלייס</option>
        <option value="facebook_group">קבוצות פייסבוק</option>
      </select>
      <select id="sort-filter" onchange="renderNew()">
        <option value="date">הכי חדש</option>
        <option value="price_asc">מחיר עולה</option>
        <option value="price_desc">מחיר יורד</option>
      </select>
      <div class="results-count" id="results-count"></div>
    </div>
    <div class="grid" id="grid-new"></div>
  </div>

  <!-- Liked tab -->
  <div id="panel-liked" style="display:none">
    <div class="sub-tabs">
      <div class="sub-tab active" onclick="switchSubTab('all')" id="subtab-all">❤️ כולן</div>
      <div class="sub-tab" onclick="switchSubTab('talk')" id="subtab-talk">📞 לדבר איתם</div>
      <div class="sub-tab" onclick="switchSubTab('maybe')" id="subtab-maybe">🤔 אולי לדבר</div>
    </div>
    <div class="grid" id="grid-liked"></div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-title">למה כן? 💚</h3>
    <p id="modal-sub">תסביר בקצרה — זה עוזר לי להבין טוב יותר מה אתה מחפש</p>
    <textarea id="modal-input" placeholder="לדוגמה: מחיר טוב, אזור מעולה, נראית משופצת..."></textarea>
    <div class="modal-actions">
      <button class="modal-skip" onclick="submitFeedback(false)">דלג</button>
      <button class="modal-submit" onclick="submitFeedback(true)">שלח ✓</button>
    </div>
  </div>
</div>

<script>
const DATA_URL = 'data/apartments.json';
const FEEDBACK_URL = 'data/feedback.json';

let state = {
  apartments: [],
  feedback: [],
  liked: JSON.parse(localStorage.getItem('liked') || '[]'),
  categories: JSON.parse(localStorage.getItem('categories') || '{}'),
  dismissed: JSON.parse(localStorage.getItem('dismissed') || '[]'),
  lastUpdated: '',
  currentTab: 'new',
  currentSubTab: 'all',
  pendingDecision: null,
};

async function loadData() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await r.json();
    state.apartments = data.apartments || [];
    state.lastUpdated = data.last_updated || '';
    document.getElementById('last-updated').textContent =
      state.lastUpdated ? 'עודכן: ' + new Date(state.lastUpdated).toLocaleString('he-IL') : '';
  } catch(e) {
    console.log('No data yet — waiting for first scrape run');
    state.apartments = [];
  }

  try {
    const r2 = await fetch(FEEDBACK_URL + '?t=' + Date.now());
    state.feedback = await r2.json();
  } catch(e) { state.feedback = []; }

  updateCounts();
  if (state.currentTab === 'new') renderNew();
  else renderLiked();
}

function updateCounts() {
  const newOnes = getNewApartments();
  const likedOnes = state.liked;
  document.getElementById('count-new').textContent = newOnes.length;
  document.getElementById('count-liked').textContent = likedOnes.length;
}

function getNewApartments() {
  return state.apartments.filter(a =>
    !state.liked.includes(a.id) && !state.dismissed.includes(a.id)
  );
}

function applyFilters(apartments) {
  const search = document.getElementById('search-input')?.value?.toLowerCase() || '';
  const source = document.getElementById('source-filter')?.value || '';
  const sort = document.getElementById('sort-filter')?.value || 'date';

  let list = apartments;
  if (search) {
    list = list.filter(a =>
      (a.title + a.address + a.description + a.neighborhood).toLowerCase().includes(search)
    );
  }
  if (source) list = list.filter(a => a.source === source);

  if (sort === 'price_asc') list = [...list].sort((a,b) => (a.price||0)-(b.price||0));
  else if (sort === 'price_desc') list = [...list].sort((a,b) => (b.price||0)-(a.price||0));

  return list;
}

function renderNew() {
  const grid = document.getElementById('grid-new');
  const filtered = applyFilters(getNewApartments());
  document.getElementById('results-count').textContent = filtered.length + ' דירות';

  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="icon">🔍</div>
      <h3>אין דירות עדיין</h3>
      <p>הסורק ירוץ בקרוב ויביא תוצאות</p>
    </div>`;
    return;
  }
  grid.innerHTML = filtered.map(a => cardHTML(a, false)).join('');
}

function renderLiked() {
  const grid = document.getElementById('grid-liked');
  let apts = state.apartments.filter(a => state.liked.includes(a.id));

  if (state.currentSubTab === 'talk')
    apts = apts.filter(a => state.categories[a.id] === 'talk');
  else if (state.currentSubTab === 'maybe')
    apts = apts.filter(a => state.categories[a.id] === 'maybe');

  if (!apts.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="icon">❤️</div>
      <h3>אין דירות שאהבת עדיין</h3>
      <p>לחץ כן על דירות כדי לשמור אותן כאן</p>
    </div>`;
    return;
  }
  grid.innerHTML = apts.map(a => cardHTML(a, true)).join('');
}

function cardHTML(a, isLiked) {
  const sourceLabel = {
    yad2: 'יד2', facebook_marketplace: 'מרקטפלייס', facebook_group: 'קבוצת פייסבוק'
  }[a.source] || a.source;

  const imgHTML = a.images && a.images[0]
    ? `<img class="card-img" src="${a.images[0]}" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>🏠</div>'">`
    : `<div class="card-img-placeholder">🏠</div>`;

  const isNew = a.date_scraped && (Date.now() - new Date(a.date_scraped)) < 24*3600*1000;
  const catState = state.categories[a.id] || '';

  const parkingTag = a.parking === true ? `<span class="tag ok">🚗 חניה</span>`
    : a.parking === false ? `<span class="tag bad">🚫 אין חניה</span>`
    : `<span class="tag warn">🚗 חניה?</span>`;
  const shelterTag = a.shelter === true ? `<span class="tag ok">🛡️ ממד</span>`
    : a.shelter === false ? `<span class="tag bad">🛡️ אין ממד</span>`
    : `<span class="tag warn">🛡️ ממד?</span>`;
  const renovTag = a.renovated === true ? `<span class="tag ok">✨ משופצת</span>`
    : a.renovated === false ? '' : '';

  const priceTag = a.price ? `<span class="tag price">₪${a.price.toLocaleString()}</span>` : '';
  const roomsTag = a.rooms ? `<span class="tag">${a.rooms} חד'</span>` : '';
  const sizeTag = a.size ? `<span class="tag">${a.size} מ"ר</span>` : '';

  const catBtns = isLiked ? `
    <div class="cat-btns">
      <button class="cat-btn talk ${catState==='talk'?'active':''}" onclick="setCategory('${a.id}','talk')">📞 לדבר איתם</button>
      <button class="cat-btn maybe ${catState==='maybe'?'active':''}" onclick="setCategory('${a.id}','maybe')">🤔 אולי לדבר</button>
    </div>` : '';

  const actionBtns = isLiked
    ? `<button class="btn-no" onclick="unLike('${a.id}')">💔 הסר</button>`
    : `<button class="btn-yes" onclick="decide('${a.id}','yes')">✅ כן</button>
       <button class="btn-no" onclick="decide('${a.id}','no')">❌ לא</button>`;

  return `<div class="card" id="card-${a.id}">
    <div class="card-img-wrap">
      ${imgHTML}
      <span class="source-badge">${sourceLabel}</span>
      ${isNew ? '<span class="new-badge">חדש!</span>' : ''}
    </div>
    <div class="card-body">
      <div class="card-title">${a.title || 'דירה להשכרה'}</div>
      <div class="card-address">📍 ${a.address || a.neighborhood || 'כתובת לא ידועה'}</div>
      <div class="card-tags">
        ${priceTag}${roomsTag}${sizeTag}${parkingTag}${shelterTag}${renovTag}
      </div>
      <div class="card-desc">${a.description || ''}</div>
      <div class="card-actions">
        ${actionBtns}
        <a href="${a.url}" target="_blank" class="btn-link" title="פתח מודעה">🔗</a>
      </div>
      ${catBtns}
    </div>
  </div>`;
}

function decide(id, decision) {
  state.pendingDecision = { id, decision };
  const modal = document.getElementById('modal');
  document.getElementById('modal-title').textContent = decision === 'yes' ? 'למה כן? 💚' : 'למה לא? ❌';
  document.getElementById('modal-sub').textContent = decision === 'yes'
    ? 'תסביר בקצרה — זה עוזר לי להבין מה אתה מחפש'
    : 'מה הבעיה? זה עוזר לי לסנן טוב יותר';
  document.getElementById('modal-input').value = '';
  modal.style.display = 'flex';
}

function submitFeedback(withText) {
  const { id, decision } = state.pendingDecision;
  const reason = withText ? document.getElementById('modal-input').value.trim() : '';
  document.getElementById('modal').style.display = 'none';

  // Save feedback
  const entry = { id, decision, reason, timestamp: new Date().toISOString() };
  state.feedback.push(entry);

  if (decision === 'yes') {
    state.liked.push(id);
    localStorage.setItem('liked', JSON.stringify(state.liked));
  } else {
    state.dismissed.push(id);
    localStorage.setItem('dismissed', JSON.stringify(state.dismissed));
  }

  // Animate out
  const card = document.getElementById('card-' + id);
  if (card) {
    card.style.transition = 'all 0.3s';
    card.style.opacity = '0';
    card.style.transform = 'scale(0.9)';
    setTimeout(() => { updateCounts(); renderNew(); }, 300);
  }

  saveFeedback(entry);
}

async function saveFeedback(entry) {
  // Save to localStorage as fallback
  const all = JSON.parse(localStorage.getItem('all_feedback') || '[]');
  all.push(entry);
  localStorage.setItem('all_feedback', JSON.stringify(all));
}

function unLike(id) {
  state.liked = state.liked.filter(x => x !== id);
  localStorage.setItem('liked', JSON.stringify(state.liked));
  updateCounts();
  renderLiked();
}

function setCategory(id, cat) {
  const current = state.categories[id];
  state.categories[id] = current === cat ? '' : cat;
  localStorage.setItem('categories', JSON.stringify(state.categories));
  renderLiked();
}

function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-new').style.display = tab === 'new' ? '' : 'none';
  document.getElementById('panel-liked').style.display = tab === 'liked' ? '' : 'none';
  if (tab === 'liked') renderLiked();
}

function switchSubTab(sub) {
  state.currentSubTab = sub;
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('subtab-' + sub).classList.add('active');
  renderLiked();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) submitFeedback(false);
});

// Load on start
loadData();
// Auto refresh every 5 min
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
